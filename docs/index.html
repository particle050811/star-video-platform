<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Star Video Platform OpenAPI</title>
  <style>
    :root {
      --bg: #f6f3ee;
      --panel: #fffdf8;
      --text: #1d1d1f;
      --muted: #6b645c;
      --line: #ded6ca;
      --accent: #b44f2e;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Iowan Old Style", "Palatino Linotype", serif;
      background:
        radial-gradient(circle at top left, #efe5d7 0, transparent 32%),
        linear-gradient(180deg, #f9f6f0 0, var(--bg) 100%);
      color: var(--text);
    }
    main {
      max-width: 760px;
      margin: 48px auto;
      padding: 0 20px;
    }
    .panel {
      background: color-mix(in srgb, var(--panel) 92%, white);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 28px;
      box-shadow: 0 18px 50px rgba(77, 55, 31, 0.08);
    }
    h1 {
      margin: 0 0 10px;
      font-size: clamp(30px, 6vw, 46px);
      line-height: 1.05;
    }
    p {
      margin: 0 0 18px;
      color: var(--muted);
      line-height: 1.6;
    }
    ul {
      list-style: none;
      padding: 0;
      margin: 20px 0 0;
      display: grid;
      gap: 12px;
    }
    a {
      display: block;
      padding: 14px 16px;
      border-radius: 14px;
      border: 1px solid var(--line);
      color: var(--text);
      text-decoration: none;
      background: #fff;
    }
    a:hover {
      border-color: var(--accent);
      transform: translateY(-1px);
    }
    strong {
      display: block;
      margin-bottom: 4px;
      color: var(--accent);
    }
    code {
      font-family: "SFMono-Regular", Consolas, monospace;
      font-size: 0.95em;
    }
  </style>
</head>
<body>
  <main>
    <section class="panel">
      <h1>OpenAPI 文档</h1>
      <p>当前项目按模块分别生成 OpenAPI YAML。可直接打开原始文档，或将链接导入 Swagger Editor、Apifox、Postman 等工具。</p>
      <ul>
        <li><a href="/openapi/openapi/user.openapi.yaml"><strong>User API</strong><code>/openapi/openapi/user.openapi.yaml</code></a></li>
        <li><a href="/openapi/openapi/video.openapi.yaml"><strong>Video API</strong><code>/openapi/openapi/video.openapi.yaml</code></a></li>
        <li><a href="/openapi/openapi/relation.openapi.yaml"><strong>Relation API</strong><code>/openapi/openapi/relation.openapi.yaml</code></a></li>
      </ul>
    </section>
  </main>
</body>
</html>
