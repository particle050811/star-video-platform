syntax = "proto3";

package api.video.v1;

option go_package = "/relation";

import "api.proto";
import "common.proto";

// SocialProfile 描述关注/粉丝/好友列表里的用户信息
message SocialProfile {
  string id = 1;
  string username = 2;
  string avatar_url = 3;
}

// SocialListWithTotal 用于社交相关的分页结果
message SocialListWithTotal {
  repeated SocialProfile items = 1;
  int64 total = 2;
  string next_cursor = 3;
  bool has_more = 4;
}

enum RelationActionType {
  RELATION_ACTION_TYPE_UNSPECIFIED = 0;
  RELATION_ACTION_TYPE_FOLLOW = 1;
  RELATION_ACTION_TYPE_UNFOLLOW = 2;
}

message RelationActionRequest {
  string to_user_id = 1 [(.api.body) = "to_user_id"];
  RelationActionType action_type = 2 [(.api.body) = "action_type", (.api.vd) = "$==1 || $==2"];
}

message RelationActionResponse {
  api.video.v1.BaseResponse base = 1 [(.api.body) = "base"];
}

message ListFollowingsRequest {
  string user_id = 1 [(.api.query) = "user_id"];
  string cursor = 2 [(.api.query) = "cursor"];
  int32 limit = 3 [(.api.query) = "limit"];
}

message ListFollowingsResponse {
  api.video.v1.BaseResponse base = 1 [(.api.body) = "base"];
  SocialListWithTotal data = 2 [(.api.body) = "data"];
}

message ListFollowersRequest {
  string user_id = 1 [(.api.query) = "user_id"];
  string cursor = 2 [(.api.query) = "cursor"];
  int32 limit = 3 [(.api.query) = "limit"];
}

message ListFollowersResponse {
  api.video.v1.BaseResponse base = 1 [(.api.body) = "base"];
  SocialListWithTotal data = 2 [(.api.body) = "data"];
}

message ListFriendsRequest {
  string cursor = 1 [(.api.query) = "cursor"];
  int32 limit = 2 [(.api.query) = "limit"];
}

message ListFriendsResponse {
  api.video.v1.BaseResponse base = 1 [(.api.body) = "base"];
  SocialListWithTotal data = 2 [(.api.body) = "data"];
}

service RelationHandler {
  rpc RelationAction(RelationActionRequest) returns (RelationActionResponse) {
    option (.api.post) = "/api/v1/relation/action";
  }
  rpc ListFollowings(ListFollowingsRequest) returns (ListFollowingsResponse) {
    option (.api.get) = "/api/v1/relation/following/list";
  }
  rpc ListFollowers(ListFollowersRequest) returns (ListFollowersResponse) {
    option (.api.get) = "/api/v1/relation/follower/list";
  }
  rpc ListFriends(ListFriendsRequest) returns (ListFriendsResponse) {
    option (.api.get) = "/api/v1/relation/friend/list";
  }
}
